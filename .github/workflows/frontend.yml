name: Frontend CI/CD with Staging

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

env:
  NODE_VERSION: 22

jobs:
  # ==================== CI: TEST & BUILD ====================
  # Source Stage → Build Stage → Team Test Stage
  ci:
    name: Continuous Integration
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Lint Code
        run: npm run lint --if-present || echo "No lint script found"

      # ---- UNIT TEST ----
      - name: Run Unit Tests
        run: npm test -- --coverage --passWithNoTests
        continue-on-error: true

      # ---- ARTIFACT 1: Coverage Report ----
      - name: Upload Coverage Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/

      - name: Upload Coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage/coverage-final.json
          flags: frontend
          fail_ci_if_error: false

      - name: Security Audit
        run: npm audit --audit-level=moderate
        continue-on-error: true

      # ---- BUILD (pakai VITE_API_URL production untuk build artifact) ----
      - name: Build Application
        run: npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      # ---- ARTIFACT 2: Build Result ----
      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: dist/
          retention-days: 7

  # ==================== STAGING ====================
  # Deploy ke Azure staging (untuk review client/atasan/dosen)
  # VITE_API_URL staging → backend staging
  deploy-staging:
    name: Deploy to Staging
    needs: ci
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    environment:
      name: staging
      url: https://nutritrack-frontend-staging.azurewebsites.net

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      # Build khusus staging dengan API URL staging
      - name: Build for Staging
        run: npm run build
        env:
          VITE_API_URL: https://nutritrack-backend-staging-container-dhbhgca0hvatgabz.indonesiacentral-01.azurewebsites.net

      - name: Deploy to Azure Web App (Staging)
        uses: azure/webapps-deploy@v3
        with:
          app-name: nutritrack-frontend-staging
          package: dist/
          publish-profile: ${{ secrets.AZURE_WEBAPP_STAGING_PUBLISH_PROFILE }}

  # ==================== SMOKE TESTS STAGING ====================
  # Business Test Stage — verifikasi staging sebelum ke production
  smoke-tests-staging:
    name: Smoke Tests on Staging
    needs: deploy-staging
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Wait for Staging to be Ready
        run: |
          for i in {1..30}; do
            if curl -f https://nutritrack-frontend-staging.azurewebsites.net; then
              echo "Staging is ready"
              exit 0
            fi
            echo "Attempt $i failed, retrying..."
            sleep 10
          done
          exit 1

      # ---- SMOKE TEST (tidak block pipeline) ----
      - name: Check Staging Site Accessible
        continue-on-error: true
        run: |
          echo "Checking staging frontend..."
          curl -s https://nutritrack-frontend-staging.azurewebsites.net | grep -q "nutritrack\|NutriTrack\|root" && echo "✅ Page loads successfully" || echo "⚠️ Page check warning"

      - name: Check Backend Connection from Staging
        continue-on-error: true
        run: |
          echo "Checking backend health from staging..."
          curl -f https://nutritrack-backend-staging-container-dhbhgca0hvatgabz.indonesiacentral-01.azurewebsites.net/api/health && echo "✅ Backend staging healthy" || echo "⚠️ Backend check warning"

      # ---- ARTIFACT 3: Smoke Test Results ----
      - name: Upload Smoke Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-test-results-frontend
          path: |
            playwright-report/
            .lighthouseci/

      - name: Performance Check
        continue-on-error: true
        run: |
          echo "Checking response time..."
          time_taken=$(curl -o /dev/null -s -w '%{time_total}' https://nutritrack-frontend-staging.azurewebsites.net)
          echo "Page load took ${time_taken}s"
          if (( $(echo "$time_taken > 5.0" | bc -l) )); then
            echo "⚠️ Warning: Slow response time"
          else
            echo "✅ Response time OK"
          fi

  # ==================== APPROVAL GATE ====================
  # Manual review staging sebelum deploy ke production
  approval-gate:
    name: Approval Gate
    needs: smoke-tests-staging
    runs-on: ubuntu-latest
    environment:
      name: production-approval

    steps:
      - name: Notify Approval Required
        run: |
          echo "✅ Frontend Staging deployment successful"
          echo "📋 Awaiting manual approval to proceed to production"
          echo "🔗 Review staging: https://nutritrack-frontend-staging.azurewebsites.net"

  # ==================== CD: DEPLOY PRODUCTION ====================
  # Hanya jalan setelah manual approval
  deploy-production:
    name: Deploy to Production
    needs: approval-gate
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    environment:
      name: production
      url: https://nutritrack-frontend-bisa.azurewebsites.net

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: dist/

      - name: Deploy to Azure Web App (Production)
        uses: azure/webapps-deploy@v3
        with:
          app-name: nutritrack-frontend-bisa
          package: dist/
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_FRONTEND }}

      - name: Health Check Production
        run: |
          sleep 30
          for i in {1..10}; do
            if curl -f https://nutritrack-frontend-bisa.azurewebsites.net; then
              echo "✅ Production deployment healthy"
              exit 0
            fi
            sleep 5
          done
          exit 1

      - name: Notify Deployment Success
        run: |
          curl -X POST ${{ secrets.DISCORD_WEBHOOK }} \
          -H "Content-Type: application/json" \
          -d '{
            "embeds": [{
              "title": "🚀 Frontend Production Deployment Successful!",
              "description": "NutriTrack Frontend berhasil deploy ke production.",
              "color": 2664261,
              "fields": [
                {"name": "App", "value": "nutritrack-frontend-bisa"},
                {"name": "Commit", "value": "${{ github.sha }}"},
                {"name": "Branch", "value": "${{ github.ref_name }}"},
                {"name": "Triggered by", "value": "${{ github.actor }}"},
                {"name": "Logs", "value": "[Klik di sini](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"}
              ]
            }]
          }'

  # ==================== ERROR NOTIFICATION ====================
  notify-failure:
    name: Notify on Failure
    runs-on: ubuntu-latest
    if: failure()
    needs: [ci, deploy-staging, smoke-tests-staging]

    steps:
      - name: Notify Discord on Failure
        run: |
          curl -X POST ${{ secrets.DISCORD_WEBHOOK }} \
          -H "Content-Type: application/json" \
          -d '{
            "embeds": [{
              "title": "❌ Frontend CI/CD Pipeline Failed!",
              "description": "Pipeline **Frontend CI/CD with Staging** gagal.",
              "color": 15158332,
              "fields": [
                {"name": "Branch", "value": "${{ github.ref_name }}"},
                {"name": "Triggered by", "value": "${{ github.actor }}"},
                {"name": "Logs", "value": "[Klik di sini](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"}
              ]
            }]
          }'

name: Frontend CI/CD

on:
  push:
    branches:
      - main
  workflow_dispatch: # ← tambah

jobs:
  # ======================================
  # JOB 1: TEST
  # ======================================
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Lint Code
        run: npm run lint

      - name: Security Audit
        run: npm audit --audit-level=high

      - name: Run Test with Coverage
        run: npm test -- --coverage

      - name: Build Application
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
        run: npm run build

  # ======================================
  # JOB 2: DEPLOY
  # ======================================
  deploy:
    needs: test # ← deploy hanya jalan kalau test sukses
    if: success() # ← conditional deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Application
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
        run: npm run build

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: nutritrack-frontend-bisa
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_FRONTEND }}
          package: ./dist

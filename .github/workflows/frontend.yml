name: Frontend CI/CD with Staging

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

env:
  NODE_VERSION: 22
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  STAGING_URL: https://nutritrack-frontend-staging-aea3bpfxbsbubsbd.indonesiacentral-01.azurewebsites.net
  PRODUCTION_URL: https://nutritrack-frontend-bisa-apadahfrbpcxe2c8.indonesiacentral-01.azurewebsites.net
  STAGING_API_URL: https://nutritrack-backend-staging-container-dhbhgca0hvatgabz.indonesiacentral-01.azurewebsites.net
  PRODUCTION_API_URL: https://nutritrack-backend-bisa-cth6c8dte7cfcmbc.indonesiacentral-01.azurewebsites.net

jobs:
  # ==================== CI: TEST & BUILD ====================
  ci:
    name: Continuous Integration
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Lint Code
        run: npm run lint --if-present || echo "No lint script found"

      - name: Run Unit Tests
        run: npm test -- --coverage --passWithNoTests
        continue-on-error: true

      - name: Upload Coverage Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/

      - name: Upload Coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage/coverage-final.json
          flags: frontend
          fail_ci_if_error: false

      - name: Security Audit
        run: npm audit --audit-level=moderate
        continue-on-error: true

      - name: Build Application
        run: npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build-${{ github.sha }}
          path: dist/
          retention-days: 30

      - name: Upload Build Artifact (latest)
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build-latest
          path: dist/
          retention-days: 7

  # ==================== STAGING ====================
  deploy-staging:
    name: Deploy to Staging
    needs: ci
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    environment:
      name: staging
      url: ${{ env.STAGING_URL }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build for Staging
        run: npm run build
        env:
          VITE_API_URL: ${{ env.STAGING_API_URL }}

      - name: Deploy to Azure Web App (Staging)
        id: deploy-staging
        uses: azure/webapps-deploy@v3
        with:
          app-name: nutritrack-frontend-staging
          package: dist/
          publish-profile: ${{ secrets.AZURE_WEBAPP_STAGING_PUBLISH_PROFILE }}

      - name: Health Check Staging
        id: staging-health
        run: |
          sleep 30
          for i in {1..10}; do
            if curl -f ${{ env.STAGING_URL }}/; then
              echo "✅ Staging healthy"
              exit 0
            fi
            sleep 5
          done
          exit 1

      - name: Rollback Staging on Failure
        if: failure() && steps.staging-health.outcome == 'failure'
        run: |
          echo "❌ Staging health check failed!"
          curl -X POST ${{ secrets.DISCORD_WEBHOOK }} \
          -H "Content-Type: application/json" \
          -d '{
            "embeds": [{
              "title": "⚠️ Staging Health Check Failed — Rollback!",
              "description": "Health check staging gagal, perlu rollback manual via Azure Portal.",
              "color": 16776960,
              "fields": [
                {"name": "Commit", "value": "${{ github.sha }}"},
                {"name": "Branch", "value": "${{ github.ref_name }}"},
                {"name": "Logs", "value": "[Klik di sini](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"}
              ]
            }]
          }'

  # ==================== SMOKE TESTS STAGING ====================
  smoke-tests-staging:
    name: Smoke Tests on Staging
    needs: deploy-staging
    runs-on: ubuntu-latest

    steps:
      - name: Wait for Staging to be Ready
        run: |
          for i in {1..30}; do
            if curl -f ${{ env.STAGING_URL }}/; then
              echo "Staging is ready"
              exit 0
            fi
            echo "Attempt $i failed, retrying..."
            sleep 10
          done
          exit 1

      - name: Check Staging Site Accessible
        run: |
          curl -s ${{ env.STAGING_URL }}/ | grep -qi "nutritrack\|root\|NutriTrack" && echo "✅ Page loads successfully" || echo "⚠️ Page check warning"

      - name: Check Backend Connection from Staging
        continue-on-error: true
        run: |
          curl -f ${{ env.STAGING_API_URL }}/api/health && echo "✅ Backend staging healthy" || echo "⚠️ Backend check warning"

      - name: Performance Check
        continue-on-error: true
        run: |
          time_taken=$(curl -o /dev/null -s -w '%{time_total}' ${{ env.STAGING_URL }}/)
          echo "Page load took ${time_taken}s"
          if (( $(echo "$time_taken > 5.0" | bc -l) )); then
            echo "⚠️ Warning: Slow response time"
          else
            echo "✅ Response time OK"
          fi

  # ==================== E2E TESTING ====================
  e2e-testing:
    name: End-to-End Testing
    needs: smoke-tests-staging
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Install Dependencies
        run: npm ci

      - name: Build App
        run: npm run build
        env:
          VITE_API_URL: ${{ env.STAGING_API_URL }}

      - name: Install Playwright
        run: npx playwright install --with-deps chromium

      - name: Run E2E Tests
        run: npm run e2e
        env:
          BASE_URL: ${{ env.STAGING_URL }}

      - name: Upload E2E Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-results-frontend
          path: |
            e2e-results.json
            playwright-report/
          if-no-files-found: warn

  # ==================== APPROVAL GATE ====================
  approval-gate:
    name: Approval Gate
    needs: e2e-testing
    runs-on: ubuntu-latest
    environment:
      name: production-approval

    steps:
      - name: Notify Approval Required
        run: |
          curl -X POST ${{ secrets.DISCORD_WEBHOOK }} \
          -H "Content-Type: application/json" \
          -d '{
            "embeds": [{
              "title": "📝 APPROVAL REQUIRED — Frontend",
              "description": "Staging + E2E Testing berhasil, menunggu approval sebelum production.",
              "color": 16776960,
              "fields": [
                {"name": "Branch", "value": "${{ github.ref_name }}"},
                {"name": "Commit", "value": "${{ github.sha }}"},
                {"name": "Staging URL", "value": "${{ env.STAGING_URL }}"},
                {"name": "Logs", "value": "[Klik di sini](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"}
              ]
            }]
          }'

  # ==================== CD: DEPLOY PRODUCTION ====================
  deploy-production:
    name: Deploy to Production
    needs: approval-gate
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    environment:
      name: production
      url: ${{ env.PRODUCTION_URL }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-build-${{ github.sha }}
          path: dist/

      - name: Deploy to Azure Web App (Production)
        id: deploy-production
        uses: azure/webapps-deploy@v3
        with:
          app-name: nutritrack-frontend-bisa
          package: dist/
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_FRONTEND }}

      - name: Health Check Production
        id: health-check
        run: |
          sleep 30
          for i in {1..10}; do
            if curl -f ${{ env.PRODUCTION_URL }}/; then
              echo "✅ Production deployment healthy"
              exit 0
            fi
            echo "Attempt $i failed, retrying..."
            sleep 5
          done
          exit 1

      - name: Rollback Production on Failure
        if: failure() && steps.health-check.outcome == 'failure'
        run: |
          echo "❌ Production health check failed!"
          curl -X POST ${{ secrets.DISCORD_WEBHOOK }} \
          -H "Content-Type: application/json" \
          -d '{
            "embeds": [{
              "title": "⚠️ Production Health Check Failed — Rollback!",
              "description": "Health check production gagal, perlu rollback manual via Azure Portal.",
              "color": 16776960,
              "fields": [
                {"name": "Commit Gagal", "value": "${{ github.sha }}"},
                {"name": "Branch", "value": "${{ github.ref_name }}"},
                {"name": "Logs", "value": "[Klik di sini](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"}
              ]
            }]
          }'

      - name: Notify Deployment Success
        if: success()
        run: |
          curl -X POST ${{ secrets.DISCORD_WEBHOOK }} \
          -H "Content-Type: application/json" \
          -d '{
            "embeds": [{
              "title": "🚀 Frontend Production Deployment Successful!",
              "description": "NutriTrack Frontend berhasil deploy ke production.",
              "color": 2664261,
              "fields": [
                {"name": "App", "value": "nutritrack-frontend-bisa"},
                {"name": "Commit", "value": "${{ github.sha }}"},
                {"name": "Branch", "value": "${{ github.ref_name }}"},
                {"name": "Triggered by", "value": "${{ github.actor }}"},
                {"name": "URL", "value": "${{ env.PRODUCTION_URL }}"},
                {"name": "Logs", "value": "[Klik di sini](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"}
              ]
            }]
          }'

  # ==================== SMOKE TESTS PRODUCTION ====================
  smoke-tests-production:
    name: Smoke Tests on Production
    needs: deploy-production
    runs-on: ubuntu-latest

    steps:
      - name: Wait for Production to be Ready
        run: |
          for i in {1..30}; do
            if curl -f ${{ env.PRODUCTION_URL }}/; then
              echo "Production is ready"
              exit 0
            fi
            echo "Attempt $i failed, retrying..."
            sleep 10
          done
          exit 1

      - name: Check Production Site Accessible
        run: |
          curl -s ${{ env.PRODUCTION_URL }}/ | grep -qi "nutritrack\|root\|NutriTrack" && echo "✅ Page loads successfully" || echo "⚠️ Page check warning"

      - name: Check Backend Connection from Production
        continue-on-error: true
        run: |
          curl -f ${{ env.PRODUCTION_API_URL }}/api/health && echo "✅ Backend production healthy" || echo "⚠️ Backend check warning"

      - name: Performance Check Production
        continue-on-error: true
        run: |
          time_taken=$(curl -o /dev/null -s -w '%{time_total}' ${{ env.PRODUCTION_URL }}/)
          echo "Page load took ${time_taken}s"
          if (( $(echo "$time_taken > 5.0" | bc -l) )); then
            echo "⚠️ Warning: Slow response time on production!"
          else
            echo "✅ Response time OK"
          fi

      - name: Notify Production Smoke Test Success
        if: success()
        run: |
          curl -X POST ${{ secrets.DISCORD_WEBHOOK }} \
          -H "Content-Type: application/json" \
          -d '{
            "embeds": [{
              "title": "🟢 FRONTEND PRODUCTION FULLY VERIFIED",
              "description": "Smoke test production berhasil, frontend berjalan normal.",
              "color": 3066993,
              "fields": [
                {"name": "Environment", "value": "Production"},
                {"name": "Branch", "value": "${{ github.ref_name }}"},
                {"name": "Commit", "value": "${{ github.sha }}"},
                {"name": "URL", "value": "${{ env.PRODUCTION_URL }}"}
              ]
            }]
          }'

      - name: Notify Production Smoke Test Failed
        if: failure()
        run: |
          curl -X POST ${{ secrets.DISCORD_WEBHOOK }} \
          -H "Content-Type: application/json" \
          -d '{
            "embeds": [{
              "title": "🔴 FRONTEND PRODUCTION SMOKE TEST FAILED!",
              "description": "Deploy berhasil tapi smoke test production gagal. Perlu investigasi!",
              "color": 15158332,
              "fields": [
                {"name": "Environment", "value": "Production"},
                {"name": "Branch", "value": "${{ github.ref_name }}"},
                {"name": "Commit", "value": "${{ github.sha }}"},
                {"name": "Logs", "value": "[Klik di sini](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"}
              ]
            }]
          }'

  # ==================== ERROR NOTIFICATION ====================
  notify-failure:
    name: Notify on Failure
    runs-on: ubuntu-latest
    if: failure()
    needs: [ci, deploy-staging, smoke-tests-staging, e2e-testing, deploy-production, smoke-tests-production]

    steps:
      - name: Notify Discord on Failure
        run: |
          curl -X POST ${{ secrets.DISCORD_WEBHOOK }} \
          -H "Content-Type: application/json" \
          -d '{
            "embeds": [{
              "title": "❌ Frontend CI/CD Pipeline Failed!",
              "description": "Pipeline **Frontend CI/CD with Staging** gagal.",
              "color": 15158332,
              "fields": [
                {"name": "Branch", "value": "${{ github.ref_name }}"},
                {"name": "Triggered by", "value": "${{ github.actor }}"},
                {"name": "Logs", "value": "[Klik di sini](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"}
              ]
            }]
          }'
